<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人網站-手機版</title>
    <style>
        :root {
            --rimuru-blue: #a0d8ef;
            --deep-space: #0a0f1d;
            --success-green: #2ecc71;
            --error-red: #ff4757;
        }

        body {
            margin: 0;
            background-color: var(--deep-space);
            color: #fff;
            font-family: 'Orbitron', 'PingFang TC', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a2a4a 0%, #0a0f1d 100%);
        }

        @keyframes initShow {
            0% { opacity: 0; transform: scale(1.05); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            animation: initShow 1.2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        .page-section {
            display: none;
            opacity: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.4s ease;
        }

        .page-section.active {
            opacity: 1;
        }

        /* --- 啟動頁面 --- */
        #init-page {
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rimuru-core {
            width: 140px; height: 110px;
            background: linear-gradient(135deg, #a0d8ef 0%, #3498db 100%);
            border-radius: 50% 50% 45% 45% / 65% 65% 35% 35%;
            margin-bottom: 30px;
            box-shadow: 0 0 40px var(--rimuru-blue);
            animation: slimeFloat 4s infinite ease-in-out;
        }

        @keyframes slimeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn-main {
            background: transparent; border: 2px solid var(--rimuru-blue);
            color: var(--rimuru-blue); padding: 15px 45px;
            font-weight: bold; cursor: pointer; border-radius: 50px;
            letter-spacing: 3px; font-family: inherit;
        }

        /* --- 四方塊選單 --- */
        #menu-grid {
            padding-top: 80px;
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        .menu-box {
            background: rgba(160, 216, 239, 0.1);
            border: 1px solid rgba(160, 216, 239, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px 10px;
            gap: 12px;
            transition: transform 0.2s ease, background 0.2s ease;
            aspect-ratio: 1 / 1.1;
        }

        .menu-box:active { background: rgba(160, 216, 239, 0.25); transform: scale(0.95); }

        .box-icon { width: 100%; display: flex; justify-content: center; overflow: hidden; }
        .box-icon img {
            width: 80%;
            height: auto;
            border-radius: 12px;
            filter: drop-shadow(0 0 5px rgba(160, 216, 239, 0.4));
        }

        /* 文字置中關鍵修正 */
        .text-content {
            width: 100%;
            text-align: center;
        }

        .tag { font-size: 0.7rem; color: var(--rimuru-blue); opacity: 0.8; letter-spacing: 1.5px; }
        h3 { font-size: 1.1rem; margin: 0; letter-spacing: 1px; }

        /* --- 內容區頁面 --- */
        #detail-section { padding-top: 80px; flex-direction: column; align-items: center; }
        
        .detail-page {
            width: calc(100% - 10px);
            max-height: 70vh;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--rimuru-blue);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(160, 216, 239, 0.2);
        }

        .detail-content-scroll { overflow-y: auto; margin-top: 15px; width: 100%; }

        .close-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; z-index: 1000;
            transition: all 0.2s ease;
        }

        .close-btn:active {
            background-color: var(--error-red); border-color: var(--error-red);
            transform: rotate(180deg) scale(1.1); box-shadow: 0 0 20px var(--error-red);
        }

        .list-table { width: 100%; border-spacing: 0 10px; }
        .clickable-td {
            padding: 18px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(160, 216, 239, 0.1); border-radius: 12px;
            text-align: center; font-weight: bold; font-size: 0.95rem;
        }

        .copy-label { transition: color 0.4s ease; }
        .simple-text { font-size: 1rem; line-height: 1.6; }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="wrapper">
        <section id="init-page" class="page-section active" style="display: flex;">
            <div class="rimuru-core"></div>
            <h2 style="letter-spacing: 6px; margin-bottom: 25px; font-size: 1.6rem;">MY WEB</h2>
            <button class="btn-main" onclick="handleNav('menu-grid')">OPEN</button>
        </section>

        <section id="menu-grid" class="page-section">
            <button class="close-btn" onclick="handleNav('init-page')">×</button>
            <div class="menu-box" onclick="openDetail('status-win', '《作品展示》')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/Y1PtqpWHKzMAAAAC/maria-mikhailovna-kujou-alya-sometimes-hides-her-feelings-in-russian.gif"></div>
                <div class="text-content"><div class="tag">PORTFOLIO</div><h3>作品集</h3></div>
            </div>
            <div class="menu-box" onclick="openDetail('nation-win', '《關於我》')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/5WKu2y1Rx1UAAAAC/franklin-lamar.gif"></div>
                <div class="text-content"><div class="tag">PROFILE</div><h3>關於我</h3></div>
            </div>
            <div class="menu-box" onclick="openDetail('skill-win', '《聯絡方式》')">
                <div class="box-icon"><img src="https://media1.tenor.com/m/MYo3MGCRzwUAAAAC/%E3%83%AA%E3%83%A0%E3%83%AB-rimuru-tempest.gif"></div>
                <div class="text-content"><div class="tag">SOCIAL</div><h3>聯絡方式</h3></div>
            </div>
            <div class="menu-box" onclick="openDetail('memo-win', '《尚未完成》')">
                <div class="box-icon"><img src="https://i.imgur.com/YvO54Ny.gif"></div>
                <div class="text-content"><div class="tag">SYSTEM</div><h3>尚未完成</h3></div>
            </div>
        </section>

        <section id="detail-section" class="page-section">
            <button class="close-btn" onclick="handleNav('menu-grid')">×</button>
            <div class="detail-page">
                <h2 id="detail-title" style="color:var(--rimuru-blue); border-bottom:1px solid rgba(160,216,239,0.3); padding-bottom:10px; margin:0; font-size: 1.2rem;"></h2>
                <div id="detail-content" class="detail-content-scroll"></div>
            </div>
        </section>
    </div>

    <template id="tpl-status-win">
        <table class="list-table"><tr onclick="window.open('https://5b2g0017-asdfg.github.io/water-puzzle/', '_blank')"><td class="clickable-td">專案01-水排序</td></tr></table>
    </template>
    <template id="tpl-nation-win">
        <div class="simple-text">
            <p><strong>姓名</strong>：Jimmy</p>
            <p><strong>興趣</strong>：動漫、籃球、棒球、傳說對決</p>
            <p><strong>近期目標</strong>：考駕照、存錢買車、存錢出國</p>
        </div>
    </template>
    <template id="tpl-skill-win">
        <table class="list-table">
            <tr onclick="window.open('https://github.com/5b2g0017-asdfg', '_blank')"><td class="clickable-td">GITHUB</td></tr>
            <tr onclick="window.open('https://www.instagram.com/xiao.__.chang', '_blank')"><td class="clickable-td">INSTAGRAM</td></tr>
            <tr onclick="copyToClipboard('5b2g0017@stust.edu.tw', this)"><td class="clickable-td"><span class="copy-label">GMAIL(點擊複製)</span></td></tr>
        </table>
    </template>
    <template id="tpl-memo-win"><div class="simple-text" style="text-align:center; padding:20px;">Coming soon...</div></template>

    <script>
        // 背景動畫 (維持)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = initCanvas; initCanvas();
        for (let i = 0; i < 30; i++) {
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 1, speedX: Math.random() * 0.4 - 0.2, speedY: Math.random() * 0.4 - 0.2, opacity: Math.random() * 0.5 + 0.2 });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
                if (p.y > canvas.height || p.y < 0) p.speedY *= -1;
                ctx.fillStyle = `rgba(160, 216, 239, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 導覽邏輯
        let currentPage = 'init-page';

        function handleNav(targetPage) {
            setTimeout(() => {
                currentPage = targetPage;
                if (targetPage !== 'init-page') {
                    history.replaceState({ page: targetPage }, '', '');
                    history.pushState({ page: 'guard' }, '', '');
                } else {
                    history.replaceState(null, '', '');
                }
                renderPage(targetPage);
            }, 180);
        }

        function renderPage(pageId) {
            const allPages = document.querySelectorAll('.page-section');
            const target = document.getElementById(pageId);
            allPages.forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
            
            if (pageId === 'menu-grid') {
                target.style.display = 'grid';
            } else {
                target.style.display = 'flex';
            }
            
            setTimeout(() => { target.classList.add('active'); }, 50);
            window.scrollTo({ top: 0 });
        }

        window.addEventListener('popstate', (e) => {
            if (currentPage === 'detail-section') {
                currentPage = 'menu-grid';
                renderPage('menu-grid');
                history.replaceState({ page: 'menu-grid' }, '', '');
                history.pushState({ page: 'guard' }, '', '');
            } else if (currentPage === 'menu-grid') {
                currentPage = 'init-page';
                renderPage('init-page');
                history.replaceState(null, '', '');
            } else {
                history.back();
            }
        });

        function openDetail(dataId, titleText) {
            const contentArea = document.getElementById('detail-content');
            const template = document.getElementById('tpl-' + dataId);
            document.getElementById('detail-title').innerText = titleText;
            contentArea.innerHTML = '';
            contentArea.appendChild(template.content.cloneNode(true));
            handleNav('detail-section');
        }

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const label = element.querySelector('.copy-label');
                const originalText = label.innerText;
                label.style.color = "var(--success-green)";
                label.innerText = "SUCCESS! 已複製";
                setTimeout(() => { label.style.color = ""; label.innerText = originalText; }, 2000);
            });
        }
    </script>
</body>

</html>
